<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>My Books</title>

<style>

body{
font-family:sans-serif;
padding:20px;
}

#book-list{
display:grid;
grid-template-columns:repeat(auto-fill,120px);
gap:20px;
}

.book img{
width:120px;
border-radius:6px;
}

.book-title{
font-size:12px;
margin-top:6px;
}

</style>

</head>

<body>

<h2>本棚</h2>

<div id="book-list"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec";

fetch(API_URL)
.then(res => res.json())
.then(books => {

const container = document.getElementById("book-list");

books.forEach(book => {

const div = document.createElement("div");
div.className = "book";

div.innerHTML = `
<img src="${book.cover}">
<div class="book-title">${book.title}</div>
`;

container.appendChild(div);

});

});

</script>

</body>

</html>
