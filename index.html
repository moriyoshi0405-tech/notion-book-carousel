<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Book Shelf</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Noto Serif JP",serif;
color:#fff;
text-align:center;
overflow-x:hidden;
background:#111;
}

/* 図書館背景 */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:
linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1507842217343-583bb7270b66");

background-size:cover;
background-position:center;

z-index:-3;
}

/* 浮遊ダスト */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:
radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px);

background-size:90px 90px;

animation:dust 60s linear infinite;

z-index:-2;
}

@keyframes dust{
0%{transform:translateY(0)}
100%{transform:translateY(-800px)}
}

/* タイトル */

.title{
font-size:36px;
margin:30px 0;
letter-spacing:4px;
color:#f5e6c8;
text-shadow:0 0 15px rgba(255,210,120,.6);
}

/* カルーセル */

.carousel{
width:100%;
overflow:visible;
position:relative;
padding-top:80px;
padding-bottom:220px;
}

/* 図書館ランプ */

.lamp{
position:absolute;
bottom:140px;
left:50%;
transform:translateX(-50%);
width:120px;
height:50px;
background:#2a2a2a;
border-radius:10px 10px 0 0;
}

.lamp::after{
content:"";
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
width:320px;
height:220px;

background:
radial-gradient(
ellipse at center,
rgba(255,210,120,.25),
transparent 70%
);
}

/* 本棚 */

.carousel::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:100px;

background:url("https://images.unsplash.com/photo-1601083748886-6a1f86b531db");

background-size:cover;

box-shadow:
inset 0 10px 20px rgba(0,0,0,.5);

border-radius:30px 30px 0 0;
}

/* トラック */

.track{
display:flex;
gap:40px;
transition:transform .6s cubic-bezier(.4,0,.2,1);
align-items:flex-end;
padding:0 20px;
}

/* 本 */

.book{
width:140px;
flex-shrink:0;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;

transition:transform .45s cubic-bezier(.4,0,.2,1);

transform-origin:bottom center;
position:relative;
}

/* 本の揺れ */

.book-inner{
animation:bookSwing 6s ease-in-out infinite;
}

@keyframes bookSwing{
0%{transform:rotate(-0.6deg)}
50%{transform:rotate(0.6deg)}
100%{transform:rotate(-0.6deg)}
}

/* 表紙 */

.book img{
width:140px;
height:210px;
object-fit:contain;
border-radius:10px;
box-shadow:0 12px 30px rgba(0,0,0,.7);
background:white;
}

/* 本が開く */

.book.open img{
animation:openBook .6s forwards;
}

@keyframes openBook{
0%{transform:rotateY(0deg)}
100%{transform:rotateY(-120deg)}
}

/* 中央 */

.book.center{
transform:scale(1.35);
z-index:5;
}

/* 周囲 */

.book:not(.center){
filter:blur(2px) brightness(.6);
opacity:.6;
}

/* タイトル */

.book-title{
margin-top:8px;
font-size:14px;
height:36px;
color:#f5e6c8;
}

/* ボタン */

.read-btn{
display:inline-block;
margin-top:6px;
padding:6px 14px;
font-size:13px;
background:#5a4632;
color:white;
border-radius:20px;
text-decoration:none;
transition:.3s;
}

.read-btn:hover{
background:#8a6d4d;
}

/* レスポンシブ */

@media(max-width:900px){

.book{width:120px;}

.book img{
width:120px;
height:180px;
}

}

@media(max-width:600px){

.title{font-size:26px;}

.book{width:100px;}

.book img{
width:100px;
height:150px;
}

}

</style>
</head>

<body>

<div class="title">おすすめの本</div>

<div class="carousel">

<div class="lamp"></div>

<div class="track" id="track"></div>

</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec"

let index=0
let books=[]

fetch(GAS_URL)
.then(res=>res.json())
.then(data=>{

books=[...data,...data,...data]

const track=document.getElementById("track")

books.forEach(book=>{

if(!book.cover) return

const div=document.createElement("div")
div.className="book"

div.innerHTML=`

<div class="book-inner">

<img src="${book.cover}">

</div>

<div class="book-title">${book.title}</div>

<a class="read-btn" href="${book.amazon}" target="_blank">読む</a>

`

div.addEventListener("click",e=>{

if(e.target.tagName==="A") return

div.classList.add("open")

setTimeout(()=>{

window.open(book.notion,"_blank")

},500)

})

track.appendChild(div)

})

updateCarousel()

setInterval(()=>{
index++
updateCarousel()
},2500)

})

function updateCarousel(){

const track=document.getElementById("track")

const first=document.querySelector(".book")

if(!first) return

const width=first.offsetWidth+40

track.style.transform=`translateX(${-index*width}px)`

document.querySelectorAll(".book").forEach(b=>b.classList.remove("center"))

const books=document.querySelectorAll(".book")

const center=Math.floor(books.length/2)

if(books[index+center]){
books[index+center].classList.add("center")
}

}

</script>

</body>
</html>
