<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Book Shelf</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">

<style>
/* === 基本 === */
body {
  margin:0;
  font-family:"Noto Serif JP",serif;
  background:#1b1b2f;
  color:#fff;
  overflow-x:hidden;
  text-align:center;
}

/* === 動く背景（光の粒＋浮遊） === */
body::before {
  content:"";
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px) repeat;
  background-size: 50px 50px;
  animation: moveBG 60s linear infinite;
  z-index:-2;
}

@keyframes moveBG{
  from{background-position:0 0;}
  to{background-position:1000px 1000px;}
}

/* === タイトル === */
.title{
  font-size:36px;
  margin:20px 0;
  letter-spacing:2px;
  color:#f0e6d2;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
  position:relative;
}

/* === カルーセル === */
.carousel{
  width:100%;
  overflow:hidden;
  position:relative;
  padding-bottom:140px;
}

/* 棚の背景 - 木目 */
.carousel::after{
  content:"";
  position:absolute;
  bottom:0; left:0;
  width:100%; height:100px;
  background:url('https://images.unsplash.com/photo-1601083748886-6a1f86b531db?auto=format&fit=crop&w=1000&q=80') repeat-x;
  background-size:cover;
  z-index:0;
  border-top-left-radius:40px;
  border-top-right-radius:40px;
  box-shadow:inset 0 5px 12px rgba(0,0,0,.3);
}

/* トラック */
.track{
  display:flex;
  gap:40px;
  transition:transform .6s cubic-bezier(.4,0,.2,1);
  align-items:flex-end;
  position:relative;
  z-index:1;
  padding:0 20px;
}

/* 本 */
.book{
  width:140px;
  flex-shrink:0;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition: transform .5s ease, filter .5s ease, box-shadow .5s ease;
}

.book img{
  width:140px;
  height:210px;
  object-fit:cover;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.5), 0 0 15px rgba(255,255,255,0.05) inset;
  background:white;
  display:block;
  margin:0 auto;
}

/* 中央拡大＋浮き上がり */
.book.center{
  transform: scale(1.4) translateY(-20px) rotateZ(-1deg);
  filter:brightness(1.1);
  z-index:3;
}

/* 中央以外 */
.book:not(.center){
  filter:brightness(0.7) blur(1.5px);
  opacity:0.6;
  margin-bottom:20px;
  z-index:1;
}

/* タイトル */
.book-title{
  margin-top:10px;
  font-size:14px;
  line-height:1.2;
  height:36px;
  color:#f0e6d2;
  text-shadow:1px 1px 4px rgba(0,0,0,.5);
}

/* ボタン */
.read-btn{
  display:inline-block;
  margin-top:6px;
  padding:6px 14px;
  font-size:13px;
  background:#4a3c31;
  color:white;
  border-radius:20px;
  text-decoration:none;
  transition:.3s;
  box-shadow:0 4px 10px rgba(0,0,0,.3);
}

.read-btn:hover{
  background:#6b5e51;
  transform: translateY(-2px);
}

/* レスポンシブ */
@media(max-width:900px){
  .book{width:120px;}
  .book img{width:120px;height:180px;}
}

@media(max-width:600px){
  .title{font-size:28px;}
  .book{width:100px;}
  .book img{width:100px;height:150px;}
}
</style>
</head>

<body>

<div class="title">おすすめの本</div>

<div class="carousel">
  <div class="track" id="track"></div>
</div>

<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec"

let index=0
let books=[]
let startX = 0
let isDragging = false

fetch(GAS_URL)
.then(res=>res.json())
.then(data=>{
  books=[...data,...data,...data]
  const track=document.getElementById("track")

  books.forEach(book=>{
    if(!book.cover) return
    const div=document.createElement("div")
    div.className="book"
    div.innerHTML=`
      <img src="${book.cover}">
      <div class="book-title">${book.title}</div>
      <a class="read-btn" href="${book.amazon}" target="_blank">読む</a>
    `
    div.addEventListener("click", e=>{
      if(e.target.tagName!=="A"){ window.open(book.notion,"_blank") }
    })
    track.appendChild(div)
  })

  updateCarousel()

  setInterval(()=>{
    index++
    updateCarousel()
  },2500)

  const carousel=document.querySelector(".carousel")
  carousel.addEventListener("touchstart", e=>{startX=e.touches[0].clientX; isDragging=true})
  carousel.addEventListener("touchmove", e=>{
    if(!isDragging) return
    const x=e.touches[0].clientX
    if(x-startX>50){ index--; updateCarousel(); isDragging=false; }
    if(x-startX<-50){ index++; updateCarousel(); isDragging=false; }
  })
  carousel.addEventListener("touchend", e=>{isDragging=false})
})

function updateCarousel(){
  const track=document.getElementById("track")
  const first=document.querySelector(".book")
  if(!first) return
  const width=first.offsetWidth+40
  track.style.transform=`translateX(${-index*width}px)`

  document.querySelectorAll(".book").forEach(b=>b.classList.remove("center"))
  const center=index+2
  const books=document.querySelectorAll(".book")
  if(books[center]) books[center].classList.add("center")
}
</script>

</body>
</html>
