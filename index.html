<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Book Shelf</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:"Noto Serif JP",serif;
background:#f7f5f1;
text-align:center;
color:#333;
}

/* タイトル */
.title{
font-size:30px;
margin:20px 0 10px 0;
letter-spacing:2px;
}

/* カルーセル */
.carousel{
width:100%;
overflow:hidden;
position:relative;
padding-bottom:120px; /* 棚のために余白 */
}

/* 棚の背景 - 木目画像 */
.carousel::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:80px;
background:url('https://images.unsplash.com/photo-1601083748886-6a1f86b531db?auto=format&fit=crop&w=1000&q=80') repeat-x;
background-size:cover;
z-index:0;
border-top-left-radius:30px;
border-top-right-radius:30px;
box-shadow:inset 0 5px 8px rgba(0,0,0,.2);
}

/* トラック */
.track{
display:flex;
gap:40px;
transition:transform .5s cubic-bezier(.4,0,.2,1);
align-items:flex-end;
position:relative;
z-index:1;
padding:0 20px;
}

/* 本 */
.book{
width:140px;
flex-shrink:0;
transition:transform .4s, filter .4s;
cursor:pointer;
position:relative;
display:flex;
flex-direction:column;
align-items:center;
}

.book img{
width:140px;
height:210px;
object-fit:contain;
border-radius:10px;
box-shadow:0 6px 15px rgba(0,0,0,.15);
background:white;
display:block;
margin:0 auto;
}

/* 中央拡大＋中央以外は少しぼかし */
.book.center{
transform:scale(1.3);
filter:blur(0);
z-index:2;
margin-bottom:0; /* 拡大時に見切れ防止 */
}
.book:not(.center){
filter:blur(2px);
opacity:0.6;
z-index:1;
margin-bottom:20px;
}

/* タイトル */
.book-title{
margin-top:8px;
font-size:13px;
height:36px;
overflow:hidden;
line-height:1.2;
}

/* ボタン */
.read-btn{
display:inline-block;
margin-top:4px;
padding:5px 12px;
font-size:12px;
background:#333;
color:white;
border-radius:18px;
text-decoration:none;
transition:.3s;
}

.read-btn:hover{
background:#666;
}

/* レスポンシブ */
@media(max-width:900px){
.book{
width:120px;
}
.book img{
width:120px;
height:180px;
}
}

@media(max-width:600px){
.title{
font-size:24px;
}
.book{
width:100px;
}
.book img{
width:100px;
height:150px;
}
}
</style>
</head>

<body>

<div class="title">おすすめの本</div>

<div class="carousel">
<div class="track" id="track"></div>
</div>

<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec"

let index=0
let books=[]

let startX = 0
let isDragging = false

fetch(GAS_URL)
.then(res=>res.json())
.then(data=>{
books=[...data,...data,...data]

const track=document.getElementById("track")

books.forEach(book=>{
if(!book.cover) return

const div=document.createElement("div")
div.className="book"

div.innerHTML=`
<img src="${book.cover}">
<div class="book-title">${book.title}</div>
<a class="read-btn" href="${book.amazon}" target="_blank">読む</a>
`

// 本全体クリックでNotionに飛ぶ
div.addEventListener("click", e=>{
if(e.target.tagName!=="A"){ 
window.open(book.notion,"_blank")
}
})

track.appendChild(div)
})

updateCarousel()

// 自動スライド
setInterval(()=>{
index++
updateCarousel()
},2500)

// タッチ操作
const carousel=document.querySelector(".carousel")
carousel.addEventListener("touchstart", e=>{
startX=e.touches[0].clientX
isDragging=true
})
carousel.addEventListener("touchmove", e=>{
if(!isDragging) return
const x=e.touches[0].clientX
if(x-startX>50){ index--; updateCarousel(); isDragging=false; }
if(x-startX<-50){ index++; updateCarousel(); isDragging=false; }
})
carousel.addEventListener("touchend", e=>{isDragging=false})

})

function updateCarousel(){
const track=document.getElementById("track")
const first=document.querySelector(".book")
if(!first) return
const width=first.offsetWidth+40
track.style.transform=`translateX(${-index*width}px)`

// 中央拡大
document.querySelectorAll(".book").forEach(b=>b.classList.remove("center"))
const center=index+2
const books=document.querySelectorAll(".book")
if(books[center]) books[center].classList.add("center")
}
</script>

</body>
</html>
