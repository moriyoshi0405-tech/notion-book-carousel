<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>Library</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Noto Serif JP",serif;
background:linear-gradient(180deg,#f7f3ee,#ece5dc);
padding:60px 20px;
text-align:center;
color:#3b352f;
}

h2{
font-size:30px;
letter-spacing:3px;
margin-bottom:50px;
}

.carousel{
position:relative;
overflow:hidden;
width:100%;
}

.track{
display:flex;
gap:40px;
transition:transform .6s ease;
}

.book{
flex:0 0 auto;
width:160px;
transition:transform .5s;
}

.book img{
width:160px;
border-radius:10px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
transition:transform .5s, box-shadow .5s;
}

.book-title{
font-size:14px;
margin-top:12px;
line-height:1.4;
}

.book.center img{
transform:scale(1.35);
box-shadow:0 30px 60px rgba(0,0,0,0.35);
}

</style>

</head>

<body>

<h2>心を動かした本たち</h2>

<div class="carousel">
<div class="track" id="track"></div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec"

let books=[]
let index=0
let autoScroll

fetch(API_URL)
.then(res=>res.json())
.then(data=>{

books=[...data,...data,...data]

const track=document.getElementById("track")

books.forEach(book=>{

const div=document.createElement("div")
div.className="book"

div.innerHTML=`
<a href="${book.notion}" target="_blank">
<img src="${book.cover}">
</a>
<div class="book-title">${book.title}</div>
`

track.appendChild(div)

})

updateCarousel()
startAutoScroll()

enableDrag()

})

function updateCarousel(){

const track=document.getElementById("track")

const bookWidth=200

track.style.transform=`translateX(${-index*bookWidth}px)`

const items=document.querySelectorAll(".book")

items.forEach(i=>i.classList.remove("center"))

const center=index+2

if(items[center]) items[center].classList.add("center")

}

function startAutoScroll(){

autoScroll=setInterval(()=>{

index++

updateCarousel()

},2500)

}

function enableDrag(){

let startX
let isDown=false

const carousel=document.querySelector(".carousel")

carousel.addEventListener("mousedown",e=>{

isDown=true
startX=e.pageX
clearInterval(autoScroll)

})

carousel.addEventListener("mouseup",e=>{

isDown=false
startAutoScroll()

})

carousel.addEventListener("mousemove",e=>{

if(!isDown) return

if(e.pageX-startX>50){

index--
updateCarousel()
startX=e.pageX

}

if(startX-e.pageX>50){

index++
updateCarousel()
startX=e.pageX

}

})

}

</script>

</body>
</html>
