<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Noto Serif JP",serif;
background:#f7f5f1;
text-align:center;
color:#333;
}

/* レビューカード */

.review-box{

position:absolute;
top:30px;
left:50%;
transform:translateX(-50%);
width:320px;

background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);

border-radius:16px;

padding:20px;

box-shadow:0 10px 30px rgba(0,0,0,.15);

opacity:0;
transition:0.6s;

pointer-events:none;

}

.review-box.show{
opacity:1;
transform:translate(-50%,0);
}

.review-title{
font-size:18px;
margin-bottom:10px;
}

.review-text{
font-size:14px;
line-height:1.6;
margin-bottom:10px;
}

.review-link{
font-size:13px;
text-decoration:none;
color:#333;
border-bottom:1px solid #333;
}

/* カルーセル */

.carousel{
width:100%;
overflow:hidden;
position:relative;
padding-top:160px;
padding-bottom:120px;
}

/* 木の棚 */

.carousel::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:80px;
background:url('https://images.unsplash.com/photo-1601083748886-6a1f86b531db?auto=format&fit=crop&w=1000&q=80') repeat-x;
background-size:cover;
box-shadow:inset 0 5px 8px rgba(0,0,0,.2);
}

/* トラック */

.track{
display:flex;
gap:40px;
transition:transform .5s cubic-bezier(.4,0,.2,1);
align-items:flex-end;
padding:0 20px;
}

/* 本 */

.book{
width:140px;
flex-shrink:0;
transition:transform .4s, filter .4s;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
}

.book img{
width:140px;
height:210px;
object-fit:contain;
border-radius:10px;
box-shadow:0 6px 15px rgba(0,0,0,.15);
background:white;
}

/* 中央 */

.book.center{
transform:scale(1.3);
filter:blur(0);
z-index:2;
}

.book:not(.center){
filter:blur(2px);
opacity:0.6;
}

/* タイトル */

.book-title{
margin-top:8px;
font-size:13px;
height:36px;
overflow:hidden;
line-height:1.2;
}

/* ボタン */

.read-btn{
display:inline-block;
margin-top:6px;
padding:6px 14px;
font-size:12px;
background:#333;
color:white;
border-radius:18px;
text-decoration:none;
}

.read-btn:hover{
background:#666;
}

</style>
</head>

<body>

<div class="review-box" id="reviewBox">
<div class="review-title" id="reviewTitle"></div>
<div class="review-text" id="reviewText"></div>
<a class="review-link" id="reviewLink" target="_blank">レビューを読む</a>
</div>

<div class="carousel">
<div class="track" id="track"></div>
</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec"

let index=0
let books=[]

fetch(GAS_URL)
.then(res=>res.json())
.then(data=>{

books=[...data,...data,...data]

const track=document.getElementById("track")

books.forEach(book=>{

if(!book.cover) return

const div=document.createElement("div")
div.className="book"

div.innerHTML=`
<img src="${book.cover}">
<div class="book-title">${book.title}</div>
<a class="read-btn" href="${book.url}" target="_blank">読む</a>
`

div.addEventListener("click",e=>{
if(e.target.tagName!=="A"){
window.open(book.url,"_blank")
}
})

track.appendChild(div)

})

updateCarousel()

setInterval(()=>{
index++
updateCarousel()
},2500)

})

function updateCarousel(){

const track=document.getElementById("track")
const first=document.querySelector(".book")

if(!first) return

const width=first.offsetWidth+40

track.style.transform=`translateX(${-index*width}px)`

document.querySelectorAll(".book").forEach(b=>b.classList.remove("center"))

const center=index+2
const bookEls=document.querySelectorAll(".book")

if(bookEls[center]){

bookEls[center].classList.add("center")

const book=books[center]

showReview(book)

}

}

function showReview(book){

const box=document.getElementById("reviewBox")

document.getElementById("reviewTitle").innerText=book.title

document.getElementById("reviewText").innerText=
book.review || "この本のレビューはNotionで読むことができます。"

document.getElementById("reviewLink").href=book.url

box.classList.add("show")

}

</script>

</body>
</html>
