<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Book Shelf</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Noto Serif JP",serif;
background:#111;
color:white;
text-align:center;
overflow-x:hidden;
}

/* 図書館背景 */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1507842217343-583bb7270b66");

background-size:cover;
background-position:center;

z-index:-2;
}

/* タイトル */

.title{
font-size:34px;
margin:40px 0;
letter-spacing:4px;
color:#f5e6c8;
text-shadow:0 0 15px rgba(255,210,120,.6);
}

/* カルーセル */

.carousel{
position:relative;
overflow:visible;
padding:80px 0 120px;
}

/* ランプ */

.lamp{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
width:120px;
height:50px;
background:#2a2a2a;
border-radius:10px 10px 0 0;
}

.lamp::after{
content:"";
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
width:300px;
height:200px;

background:radial-gradient(
ellipse at center,
rgba(255,210,120,.3),
transparent 70%
);
}

/* トラック */

.track{
display:flex;
gap:40px;
align-items:flex-end;

transition:transform .6s cubic-bezier(.4,0,.2,1);

will-change:transform;
}

/* 本 */

.book{
width:140px;
flex-shrink:0;

display:flex;
flex-direction:column;
align-items:center;

transition:transform .4s, filter .4s;

transform-origin:bottom center;
cursor:pointer;
}

/* 本揺れ */

.book-inner{
animation:swing 6s ease-in-out infinite;
}

@keyframes swing{
0%{transform:rotate(-0.6deg)}
50%{transform:rotate(0.6deg)}
100%{transform:rotate(-0.6deg)}
}

/* 表紙 */

.book img{
width:140px;
height:210px;
object-fit:contain;
border-radius:10px;
background:white;
box-shadow:0 12px 30px rgba(0,0,0,.7);
}

/* 本開く */

.book.open img{
animation:open .6s forwards;
}

@keyframes open{
0%{transform:rotateY(0)}
100%{transform:rotateY(-120deg)}
}

/* 中央 */

.book.center{
transform:scale(1.35);
z-index:10;
}

/* 周囲 */

.book:not(.center){
filter:blur(2px) brightness(.6);
opacity:.6;
}

/* タイトル */

.book-title{
margin-top:10px;
font-size:14px;
height:36px;
color:#f5e6c8;
}

/* ボタン */

.read-btn{
margin-top:6px;
padding:6px 14px;
font-size:13px;
background:#5a4632;
color:white;
border-radius:20px;
text-decoration:none;
transition:.3s;
}

.read-btn:hover{
background:#8a6d4d;
}

</style>
</head>

<body>

<div class="title">おすすめの本</div>

<div class="carousel">

<div class="lamp"></div>

<div class="track" id="track"></div>

</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec"

let index=0
let books=[]

fetch(GAS_URL)
.then(res=>res.json())
.then(data=>{

books=[...data,...data,...data]

const track=document.getElementById("track")

books.forEach(book=>{

if(!book.cover) return

const div=document.createElement("div")
div.className="book"

div.innerHTML=`

<div class="book-inner">
<img src="${book.cover}">
</div>

<div class="book-title">${book.title}</div>
<a class="read-btn" href="${book.amazon}" target="_blank">読む</a>

`

div.addEventListener("click",e=>{

if(e.target.tagName==="A") return

div.classList.add("open")

setTimeout(()=>{
window.open(book.notion,"_blank")
},500)

})

track.appendChild(div)

})

updateCarousel()

setInterval(()=>{
index++
updateCarousel()
},2500)

})

function updateCarousel(){

const track=document.getElementById("track")
const books=document.querySelectorAll(".book")

if(!books.length) return

const width=books[0].offsetWidth + 40

track.style.transform=`translateX(calc(50% - ${(index*width)+(width/2)}px))`

books.forEach(b=>b.classList.remove("center"))

if(books[index]){
books[index].classList.add("center")
}

}

</script>

</body>
</html>
