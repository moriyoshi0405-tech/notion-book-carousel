<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Noto Serif JP",serif;
background:#f4f1ea;
overflow:hidden;
}

/* レビュー */

.review-box{

position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);

width:340px;

background:rgba(255,255,255,.92);
backdrop-filter:blur(10px);

padding:20px;

border-radius:16px;

box-shadow:0 10px 30px rgba(0,0,0,.2);

opacity:0;
transition:.4s;

}

.review-box.show{
opacity:1;
}

.review-title{
font-size:18px;
margin-bottom:5px;
}

.review-rating{
color:#d4a017;
margin-bottom:10px;
}

.review-text{
font-size:14px;
line-height:1.7;
margin-bottom:10px;
}

.review-link{
font-size:13px;
text-decoration:none;
border-bottom:1px solid #333;
color:#333;
}

/* カルーセル */

.carousel{

width:100%;
height:100vh;

display:flex;
align-items:flex-end;

overflow:hidden;

position:relative;

}

/* 木棚 */

.carousel::after{

content:"";

position:absolute;

bottom:0;
left:0;

width:100%;
height:90px;

background:url("https://images.unsplash.com/photo-1601083748886-6a1f86b531db?auto=format&fit=crop&w=1200&q=80");

background-size:cover;

box-shadow:inset 0 6px 10px rgba(0,0,0,.25);

}

/* トラック */

.track{

display:flex;

gap:40px;

padding:0 40px 100px;

transition:transform .6s cubic-bezier(.4,0,.2,1);

}

/* 本 */

.book{

width:140px;

flex-shrink:0;

display:flex;
flex-direction:column;
align-items:center;

cursor:pointer;

transition:.4s;

}

.book img{

width:140px;
height:210px;

object-fit:contain;

border-radius:8px;

background:white;

box-shadow:0 8px 18px rgba(0,0,0,.18);

}

/* 中央本 */

.book.center{

transform:scale(1.35);

filter:blur(0);

z-index:2;

}

.book:not(.center){

filter:blur(2px);

opacity:.6;

}

/* タイトル */

.book-title{

margin-top:8px;

font-size:13px;

text-align:center;

line-height:1.4;

}

/* ボタン */

.read-btn{

margin-top:6px;

padding:6px 14px;

background:#333;

color:white;

border-radius:20px;

font-size:12px;

text-decoration:none;

}

.read-btn:hover{
background:#555;
}

/* スマホ */

@media(max-width:700px){

.book{
width:100px;
}

.book img{
width:100px;
height:150px;
}

.review-box{
width:280px;
}

}

</style>

</head>

<body>

<div class="review-box" id="reviewBox">

<div class="review-title" id="reviewTitle"></div>

<div class="review-rating" id="reviewRating"></div>

<div class="review-text" id="reviewText"></div>

<a class="review-link" id="reviewLink" target="_blank">
レビューを読む
</a>

</div>

<div class="carousel">
<div class="track" id="track"></div>
</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec"

let books=[]
let index=0
let bookWidth=0

let startX=0
let dragging=false

fetch(GAS_URL)

.then(res=>res.json())

.then(data=>{

books=data

const track=document.getElementById("track")

/* 無限ループ用 */

const displayBooks=[
books[books.length-1],
...books,
books[0]
]

displayBooks.forEach(book=>{

const div=document.createElement("div")

div.className="book"

div.innerHTML=`

<img src="${book.cover}">

<div class="book-title">${book.title}</div>

<a class="read-btn" href="${book.url}" target="_blank">
読む
</a>

`

div.addEventListener("click",e=>{

if(e.target.tagName!=="A"){

window.open(book.reviewPage,"_blank")

}

})

track.appendChild(div)

})

setTimeout(()=>{

bookWidth=document.querySelector(".book").offsetWidth+40

index=1
updateCarousel(true)

},100)

setInterval(()=>{

index++
updateCarousel()

},2500)

initSwipe()

})

function updateCarousel(jump=false){

const track=document.getElementById("track")

if(jump){
track.style.transition="none"
}else{
track.style.transition="transform .6s cubic-bezier(.4,0,.2,1)"
}

track.style.transform=`translateX(${-index*bookWidth}px)`

updateCenter()

setTimeout(()=>{

if(index===books.length+1){

track.style.transition="none"

index=1

track.style.transform=`translateX(${-index*bookWidth}px)`

}

if(index===0){

track.style.transition="none"

index=books.length

track.style.transform=`translateX(${-index*bookWidth}px)`

}

updateCenter()

},600)

}

function updateCenter(){

document.querySelectorAll(".book").forEach(b=>b.classList.remove("center"))

const els=document.querySelectorAll(".book")

if(els[index]){

els[index].classList.add("center")

const book=books[(index-1+books.length)%books.length]

showReview(book)

}

}

function showReview(book){

document.getElementById("reviewTitle").innerText=book.title

document.getElementById("reviewRating").innerText=book.rating || ""

document.getElementById("reviewText").innerText=
book.summary || "レビュー準備中"

document.getElementById("reviewLink").href=
book.reviewPage || book.url

document.getElementById("reviewBox").classList.add("show")

}

function initSwipe(){

const carousel=document.querySelector(".carousel")

carousel.addEventListener("touchstart",e=>{

startX=e.touches[0].clientX
dragging=true

})

carousel.addEventListener("touchmove",e=>{

if(!dragging)return

const x=e.touches[0].clientX

if(x-startX>60){

index--
updateCarousel()
dragging=false

}

if(x-startX<-60){

index++
updateCarousel()
dragging=false

}

})

carousel.addEventListener("touchend",()=>{

dragging=false

})

}

</script>

</body>

</html>
