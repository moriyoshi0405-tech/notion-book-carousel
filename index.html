<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Reading Library</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Noto Serif JP',serif;
background:#0f0f0f;
color:white;
overflow-x:hidden;
}

/* タイトル */

.header{
text-align:center;
padding:40px 20px;
font-size:28px;
letter-spacing:2px;
}

/* カルーセル */

.carousel-wrapper{
overflow:visible;
position:relative;
padding:40px 0 80px;
}

.carousel{
display:flex;
align-items:flex-end;
gap:40px;
transition:transform .8s cubic-bezier(.25,.8,.25,1);
}

/* 本 */

.book{
flex:0 0 auto;
width:160px;
transition:.4s;
text-align:center;
position:relative;
}

.book img{
width:100%;
height:auto;
max-height:260px;
object-fit:contain;
border-radius:6px;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* 中央 */

.book.center{
transform:scale(1.35);
z-index:3;
}

.book.center img{
box-shadow:0 20px 60px rgba(0,0,0,0.9);
}

/* 星 */

.stars{
margin-top:8px;
font-size:18px;
color:#f7c948;
}

/* ボタン */

.btn{
margin-top:8px;
display:inline-block;
padding:6px 14px;
border-radius:20px;
background:#ffffff20;
backdrop-filter:blur(6px);
color:white;
font-size:13px;
text-decoration:none;
transition:.2s;
}

.btn:hover{
background:#ffffff40;
}

/* 要約ポップアップ */

.popup{
position:absolute;
top:110%;
left:50%;
transform:translateX(-50%);
width:220px;
background:#1e1e1e;
padding:12px;
border-radius:10px;
font-size:13px;
opacity:0;
pointer-events:none;
transition:.3s;
box-shadow:0 10px 40px rgba(0,0,0,0.7);
line-height:1.6;
}

.book:hover .popup{
opacity:1;
}

/* 本棚 */

.shelf{
height:10px;
background:linear-gradient(90deg,#3a2b1a,#6b4c2b,#3a2b1a);
margin-top:60px;
}

/* レビュー */

.review{
text-align:center;
padding:20px 20px 40px;
max-width:700px;
margin:auto;
}

.review h2{
font-weight:500;
margin-bottom:8px;
}

.review p{
opacity:.85;
line-height:1.7;
}

/* モバイル */

@media(max-width:600px){

.book{
width:120px;
}

.book img{
max-height:200px;
}

.carousel{
gap:26px;
}

}

</style>
</head>

<body>

<div class="header">
📚 My Reading Library
</div>

<div class="carousel-wrapper">

<div class="carousel" id="carousel"></div>

<div class="shelf"></div>

</div>

<div class="review">

<h2 id="reviewTitle"></h2>

<div id="reviewStars"></div>

<p id="reviewText"></p>

<a id="reviewLink" class="btn" target="_blank">
レビューを見る
</a>

</div>

<script>

const API_URL="https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrQ0kK8yWirZHS1ogXGiDYEAKzarRA2YLXr4HP_Ya2qmAEQy66s-MUPzEJyAl8u2gA-Qvz79Vg57sB0t12WrbjThsMuNfBC5DbdV3alRwlEwWqhtlStRqgUXDX_tmkujNeVE1Bhtt4ORvRsv5i8NRGcoMBh-fHrn7hQdm0Z9dFvxXbslFb1Nv-JSkGj324xR6Pzrqfave_sKX5bjWhhUv6TdAP14aMISKHduObXpmq41Mwn7ShwFVSi8FCHmmABDDLj1Q8zswNYaWlq0KJlpX01I-bnnoseVctrx5lXn&lib=MTxa2CCwbNbMYXz0meqP7D6Vl8dBRJ7dL"

let books=[]
let index=0
let autoScroll

function stars(r){
if(!r)return""
return r
}

function updateReview(book){

document.getElementById("reviewTitle").innerText=book.title
document.getElementById("reviewStars").innerText=stars(book.rating)
document.getElementById("reviewText").innerText=book.summary||"レビュー準備中"
document.getElementById("reviewLink").href=book.reviewPage||book.url

}

function createBooks(data){

const carousel=document.getElementById("carousel")

books=[...data,...data,...data]

books.forEach(book=>{

const el=document.createElement("div")
el.className="book"

el.innerHTML=`

<img src="${book.cover}" loading="lazy">

<div class="stars">${stars(book.rating)}</div>

<a class="btn" href="${book.url}" target="_blank">
読む
</a>

<div class="popup">${book.summary||""}</div>

`

carousel.appendChild(el)

})

update()

}

function update(){

const carousel=document.getElementById("carousel")
const items=document.querySelectorAll(".book")

items.forEach(i=>i.classList.remove("center"))

items[index].classList.add("center")

const width=items[0].offsetWidth+40

carousel.style.transform=
`translateX(${window.innerWidth/2-width/2-index*width}px)`

const realIndex=index% (books.length/3)

updateReview(books[realIndex])

}

function next(){

index++

if(index>books.length-1){
index=Math.floor(books.length/3)
}

update()

}

function auto(){

autoScroll=setInterval(next,4500)

}

function stop(){

clearInterval(autoScroll)

}

fetch(API_URL)
.then(r=>r.json())
.then(data=>{

createBooks(data)

index=Math.floor(data.length)

update()

auto()

})

let startX=0

document.addEventListener("touchstart",e=>{

startX=e.touches[0].clientX
stop()

})

document.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>50)next()

if(endX-startX>50){
index--
update()
}

auto()

})

</script>

</body>
</html>
