<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>Bookshelf</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Noto Serif JP", serif;
background:linear-gradient(180deg,#faf7f2,#f1ece6);
padding:60px 20px;
text-align:center;
color:#3a342e;
}

h2{
font-size:28px;
font-weight:600;
letter-spacing:2px;
margin-bottom:40px;
}

.carousel{
overflow:hidden;
width:100%;
}

.track{
display:flex;
gap:36px;
animation:scroll 45s linear infinite;
}

.carousel:hover .track{
animation-play-state:paused;
}

.book{
flex:0 0 auto;
transition:transform .4s;
}

.book img{
width:150px;
border-radius:10px;
box-shadow:0 15px 35px rgba(0,0,0,0.18);
transition:transform .3s, box-shadow .3s;
}

.book:hover img{
transform:translateY(-8px);
box-shadow:0 25px 45px rgba(0,0,0,0.25);
}

.book-title{
font-size:13px;
margin-top:10px;
width:150px;
line-height:1.4;
}

.book.center img{
transform:scale(1.25);
}

@keyframes scroll{
0%{
transform:translateX(0);
}
100%{
transform:translateX(-50%);
}
}

</style>

</head>

<body>

<h2>心を動かした本</h2>

<div class="carousel">
<div class="track" id="track"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec";

fetch(API_URL)
.then(res=>res.json())
.then(books=>{

const track=document.getElementById("track")

const list=[...books,...books]

list.forEach(book=>{

const div=document.createElement("div")
div.className="book"

div.innerHTML=`
<a href="${book.notion}" target="_blank">
<img src="${book.cover}">
</a>
<div class="book-title">${book.title}</div>
`

track.appendChild(div)

})

highlightCenter()

})

function highlightCenter(){

const books=document.querySelectorAll(".book")

setInterval(()=>{

books.forEach(b=>b.classList.remove("center"))

const middle=Math.floor(Math.random()*books.length)

books[middle].classList.add("center")

},2000)

}

</script>

</body>
</html>
