<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:transparent;
font-family:sans-serif;
overflow:hidden;
}

.slider{
width:100%;
overflow:hidden;
padding:20px 0;
}

.slider-track{
display:flex;
gap:24px;
transition:transform 0.8s ease;
}

.book{
flex:0 0 auto;
}

.book img{
height:180px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
transition:transform .35s, box-shadow .35s;
cursor:pointer;
}

.book img:hover{
transform:scale(1.12);
box-shadow:0 16px 30px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="slider" id="slider">

<div class="slider-track" id="track">

<a class="book" href="#" target="_blank">
<img src="https://m.media-amazon.com/images/I/71vZyD1LoyL._SL1200_.jpg">
</a>

<a class="book" href="#" target="_blank">
<img src="BOOK_IMAGE_URL">
</a>

<a class="book" href="#" target="_blank">
<img src="BOOK_IMAGE_URL">
</a>

<a class="book" href="#" target="_blank">
<img src="BOOK_IMAGE_URL">
</a>

<a class="book" href="#" target="_blank">
<img src="BOOK_IMAGE_URL">
</a>

<a class="book" href="#" target="_blank">
<img src="BOOK_IMAGE_URL">
</a>

<a class="book" href="#" target="_blank">
<img src="BOOK_IMAGE_URL">
</a>

<a class="book" href="#" target="_blank">
<img src="BOOK_IMAGE_URL">
</a>

<a class="book" href="#" target="_blank">
<img src="BOOK_IMAGE_URL">
</a>

<a class="book" href="#" target="_blank">
<img src="BOOK_IMAGE_URL">
</a>

</div>

</div>

<script>

const slider = document.getElementById("slider")
const track = document.getElementById("track")

let books = document.querySelectorAll(".book")

// 無限ループ用複製
books.forEach(book=>{
const clone = book.cloneNode(true)
track.appendChild(clone)
})

books = document.querySelectorAll(".book")

let index = 0

function moveSlide(){

index++

const width = books[0].offsetWidth + 24

track.style.transform =
`translateX(-${width * index}px)`

if(index >= books.length/2){

setTimeout(()=>{

track.style.transition="none"
index=0
track.style.transform="translateX(0)"

setTimeout(()=>{
track.style.transition="transform 0.8s ease"
},50)

},800)

}

}

let auto = setInterval(moveSlide,4000)

slider.addEventListener("mouseenter",()=>{
clearInterval(auto)
})

slider.addEventListener("mouseleave",()=>{
auto=setInterval(moveSlide,4000)
})

</script>

</body>
</html>
