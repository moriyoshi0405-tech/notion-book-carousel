<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Noto Serif JP",serif;
background:#f6f4ef;
color:#333;
text-align:center;
}

/* レビューカード */

.review-box{

position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
width:340px;

background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);

border-radius:16px;
padding:20px;

box-shadow:0 10px 30px rgba(0,0,0,.15);

opacity:0;
transition:0.5s;

pointer-events:none;

}

.review-box.show{
opacity:1;
transform:translate(-50%,0);
}

.review-title{
font-size:18px;
margin-bottom:8px;
}

.review-rating{
color:#d4a017;
margin-bottom:10px;
font-size:16px;
}

.review-text{
font-size:14px;
line-height:1.7;
margin-bottom:10px;
}

.review-link{
font-size:13px;
text-decoration:none;
border-bottom:1px solid #333;
color:#333;
}

/* カルーセル */

.carousel{
width:100%;
overflow:hidden;
position:relative;
padding-top:180px;
padding-bottom:120px;
}

/* 木の棚 */

.carousel::after{

content:"";
position:absolute;

bottom:0;
left:0;

width:100%;
height:90px;

background:url("https://images.unsplash.com/photo-1601083748886-6a1f86b531db?auto=format&fit=crop&w=1200&q=80");

background-size:cover;

box-shadow:inset 0 6px 10px rgba(0,0,0,.25);

}

/* トラック */

.track{

display:flex;
gap:40px;

align-items:flex-end;

transition:transform .6s cubic-bezier(.4,0,.2,1);

padding:0 40px;

}

/* 本 */

.book{

width:140px;
flex-shrink:0;

display:flex;
flex-direction:column;
align-items:center;

cursor:pointer;

transition:.4s;

}

.book img{

width:140px;
height:210px;

object-fit:contain;

border-radius:8px;

background:white;

box-shadow:0 8px 18px rgba(0,0,0,.18);

}

/* 中央本 */

.book.center{

transform:scale(1.35);

filter:blur(0);

z-index:2;

}

/* その他 */

.book:not(.center){

filter:blur(2px);
opacity:.6;

}

/* タイトル */

.book-title{

margin-top:8px;

font-size:13px;

line-height:1.3;

height:36px;

overflow:hidden;

}

/* ボタン */

.read-btn{

display:inline-block;

margin-top:6px;

padding:6px 14px;

font-size:12px;

border-radius:20px;

background:#333;
color:white;

text-decoration:none;

}

.read-btn:hover{

background:#555;

}

/* スマホ */

@media(max-width:700px){

.book{
width:100px;
}

.book img{
width:100px;
height:150px;
}

}

</style>

</head>

<body>


<div class="review-box" id="reviewBox">

<div class="review-title" id="reviewTitle"></div>

<div class="review-rating" id="reviewRating"></div>

<div class="review-text" id="reviewText"></div>

<a class="review-link" id="reviewLink" target="_blank">
レビューを読む
</a>

</div>


<div class="carousel">

<div class="track" id="track"></div>

</div>


<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec"

let books=[]
let index=0

let startX=0
let isDragging=false



fetch(GAS_URL)

.then(res=>res.json())

.then(data=>{

books=[...data,...data,...data]

const track=document.getElementById("track")

books.forEach(book=>{

if(!book.cover) return

const div=document.createElement("div")

div.className="book"

div.innerHTML=`

<img src="${book.cover}">

<div class="book-title">${book.title}</div>

<a class="read-btn" href="${book.url}" target="_blank">
読む
</a>

`

div.addEventListener("click",e=>{

if(e.target.tagName!=="A"){

window.open(book.reviewPage,"_blank")

}

})

track.appendChild(div)

})

updateCarousel()

setInterval(()=>{

index++

updateCarousel()

},2500)



initSwipe()

})



function updateCarousel(){

const track=document.getElementById("track")

const first=document.querySelector(".book")

if(!first) return

const width=first.offsetWidth+40

track.style.transform=`translateX(${-index*width}px)`



document.querySelectorAll(".book").forEach(b=>b.classList.remove("center"))

const center=index+2

const bookEls=document.querySelectorAll(".book")

if(bookEls[center]){

bookEls[center].classList.add("center")

showReview(books[center])

}

}



function showReview(book){

const box=document.getElementById("reviewBox")

document.getElementById("reviewTitle").innerText=book.title

document.getElementById("reviewText").innerText=
book.summary || "レビュー準備中"

document.getElementById("reviewRating").innerText=
book.rating || ""

document.getElementById("reviewLink").href=book.reviewPage

box.classList.add("show")

}



function initSwipe(){

const carousel=document.querySelector(".carousel")

carousel.addEventListener("touchstart",e=>{

startX=e.touches[0].clientX

isDragging=true

})



carousel.addEventListener("touchmove",e=>{

if(!isDragging) return

const x=e.touches[0].clientX

if(x-startX>60){

index--

updateCarousel()

isDragging=false

}

if(x-startX<-60){

index++

updateCarousel()

isDragging=false

}

})



carousel.addEventListener("touchend",()=>{

isDragging=false

})

}

</script>

</body>

</html>
