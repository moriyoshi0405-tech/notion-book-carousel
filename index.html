<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Book Shelf</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ===================== */
/* 背景 図書館 */
/* ===================== */

body{
margin:0;
font-family:"Noto Serif JP",serif;
color:#fff;
text-align:center;
overflow-x:hidden;
background:#141414;
}

/* 図書館背景 */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1507842217343-583bb7270b66");

background-size:cover;
background-position:center;
z-index:-3;
}

/* ===================== */
/* 浮遊ダスト */
/* ===================== */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:
radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);

background-size:80px 80px;

animation:dustMove 60s linear infinite;

z-index:-2;
}

@keyframes dustMove{

0%{
transform:translateY(0px);
}

100%{
transform:translateY(-800px);
}

}

/* ===================== */
/* タイトル */
/* ===================== */

.title{

font-size:36px;
margin:30px 0;

letter-spacing:4px;

color:#f5e6c8;

text-shadow:
0 0 10px rgba(255,210,120,0.6),
0 0 20px rgba(255,210,120,0.4);

}

/* ===================== */
/* カルーセル */
/* ===================== */

.carousel{

width:100%;
overflow:hidden;
position:relative;

padding-bottom:150px;

}

/* ===================== */
/* 本棚 */
/* ===================== */

.carousel::after{

content:"";

position:absolute;
bottom:0;
left:0;

width:100%;
height:100px;

background:

linear-gradient(
to bottom,
rgba(255,200,120,0.2),
rgba(0,0,0,0.4)
),

url("https://images.unsplash.com/photo-1601083748886-6a1f86b531db");

background-size:cover;

box-shadow:
inset 0 8px 20px rgba(0,0,0,.5),
0 -4px 30px rgba(255,200,120,.2);

border-radius:30px 30px 0 0;

}

/* ===================== */
/* トラック */
/* ===================== */

.track{

display:flex;
gap:40px;

transition:transform .6s cubic-bezier(.4,0,.2,1);

align-items:flex-end;

padding:0 20px;

}

/* ===================== */
/* 本 */
/* ===================== */

.book{

width:140px;

flex-shrink:0;

cursor:pointer;

display:flex;

flex-direction:column;

align-items:center;

transition:
transform .5s,
filter .5s;

position:relative;

}

/* 本の表紙 */

.book img{

width:140px;
height:210px;

object-fit:cover;

border-radius:10px;

box-shadow:
0 10px 25px rgba(0,0,0,.7);

background:white;

}

/* ===================== */
/* 光の反射 */
/* ===================== */

.book::before{

content:"";

position:absolute;

top:0;
left:-80%;

width:60%;
height:100%;

background:
linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.5),
transparent
);

transform:skewX(-20deg);

transition:0.8s;

pointer-events:none;

}

.book:hover::before{

left:120%;

}

/* ===================== */
/* 中央の本 */
/* ===================== */

.book.center{

transform:scale(1.4) translateY(-25px);

z-index:3;

filter:brightness(1.2);

}

/* 周囲 */

.book:not(.center){

filter:blur(2px) brightness(.6);

opacity:.6;

}

/* ===================== */
/* タイトル */
/* ===================== */

.book-title{

margin-top:8px;

font-size:14px;

line-height:1.2;

height:36px;

color:#f5e6c8;

text-shadow:0 2px 4px rgba(0,0,0,.7);

}

/* ===================== */
/* ボタン */
/* ===================== */

.read-btn{

display:inline-block;

margin-top:6px;

padding:6px 14px;

font-size:13px;

background:#5a4632;

color:white;

border-radius:20px;

text-decoration:none;

transition:.3s;

}

.read-btn:hover{

background:#8a6d4d;

transform:translateY(-2px);

}

/* ===================== */
/* レスポンシブ */
/* ===================== */

@media(max-width:900px){

.book{
width:120px;
}

.book img{
width:120px;
height:180px;
}

}

@media(max-width:600px){

.title{
font-size:26px;
}

.book{
width:100px;
}

.book img{
width:100px;
height:150px;
}

}

</style>
</head>

<body>

<div class="title">おすすめの本</div>

<div class="carousel">
<div class="track" id="track"></div>
</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec"

let index=0
let books=[]

let startX=0
let isDragging=false

fetch(GAS_URL)

.then(res=>res.json())

.then(data=>{

books=[...data,...data,...data]

const track=document.getElementById("track")

books.forEach(book=>{

if(!book.cover) return

const div=document.createElement("div")

div.className="book"

div.innerHTML=`

<img src="${book.cover}">

<div class="book-title">${book.title}</div>

<a class="read-btn" href="${book.amazon}" target="_blank">読む</a>

`

div.addEventListener("click",e=>{

if(e.target.tagName!=="A"){

window.open(book.notion,"_blank")

}

})

track.appendChild(div)

})

updateCarousel()

setInterval(()=>{

index++

updateCarousel()

},2500)

const carousel=document.querySelector(".carousel")

carousel.addEventListener("touchstart",e=>{

startX=e.touches[0].clientX

isDragging=true

})

carousel.addEventListener("touchmove",e=>{

if(!isDragging) return

const x=e.touches[0].clientX

if(x-startX>50){

index--

updateCarousel()

isDragging=false

}

if(x-startX<-50){

index++

updateCarousel()

isDragging=false

}

})

carousel.addEventListener("touchend",()=>{

isDragging=false

})

})

function updateCarousel(){

const track=document.getElementById("track")

const first=document.querySelector(".book")

if(!first) return

const width=first.offsetWidth+40

track.style.transform=`translateX(${-index*width}px)`

document.querySelectorAll(".book").forEach(b=>b.classList.remove("center"))

const center=index+2

const books=document.querySelectorAll(".book")

if(books[center]) books[center].classList.add("center")

}

</script>

</body>
</html>
