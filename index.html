<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Library</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Noto Serif JP",serif;
background:#f3eee7;
padding:60px 10px;
text-align:center;
color:#3b352f;
}

h2{
font-size:28px;
letter-spacing:3px;
margin-bottom:50px;
}

.carousel{
position:relative;
overflow:visible;
width:100%;
padding-bottom:40px;
}

.shelf{
position:absolute;
bottom:0;
left:0;
width:100%;
height:18px;
background:linear-gradient(90deg,#8b5e3c,#a87348,#8b5e3c);
border-radius:4px;
box-shadow:
0 6px 10px rgba(0,0,0,0.25),
inset 0 2px 3px rgba(255,255,255,0.3);
}

.track{
display:flex;
gap:30px;
transition:transform .6s ease;
align-items:flex-end;
}

.book{
flex:0 0 auto;
width:160px;
text-align:center;
transition:transform .5s;
}

.book img{
width:100%;
border-radius:6px;
box-shadow:0 15px 25px rgba(0,0,0,0.25);
transition:transform .5s;
}

.book-title{
font-size:14px;
margin-top:10px;
line-height:1.4;
min-height:40px;
}

.read-btn{
display:inline-block;
margin-top:8px;
padding:6px 14px;
font-size:12px;
background:#7a5c3e;
color:white;
text-decoration:none;
border-radius:20px;
transition:.25s;
}

.read-btn:hover{
background:#5c432b;
transform:translateY(-2px);
}

.book.center img{
transform:scale(1.25);
box-shadow:0 25px 40px rgba(0,0,0,0.35);
}

/* ---------- レスポンシブ ---------- */

@media (max-width:900px){

.book{
width:130px;
}

}

@media (max-width:600px){

.book{
width:100px;
}

h2{
font-size:22px;
}

.book-title{
font-size:12px;
}

}

</style>

</head>

<body>

<h2>心を動かした本たち</h2>

<div class="carousel">

<div class="track" id="track"></div>

<div class="shelf"></div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec"

let books=[]
let index=0
let autoScroll

fetch(API_URL)
.then(res=>res.json())
.then(data=>{

books=[...data,...data,...data]

const track=document.getElementById("track")

books.forEach(book=>{

const div=document.createElement("div")
div.className="book"

div.innerHTML=`

<a href="${book.notion}" target="_blank">
<img src="${book.cover}">
</a>

<div class="book-title">${book.title}</div>

<a class="read-btn" href="${book.amazon}" target="_blank">
読む
</a>

`

track.appendChild(div)

})

updateCarousel()
startAutoScroll()
enableDrag()

})

function getBookWidth(){

const book=document.querySelector(".book")

return book.offsetWidth + 30

}

function updateCarousel(){

const track=document.getElementById("track")

const bookWidth=getBookWidth()

track.style.transform=`translateX(${-index*bookWidth}px)`

const items=document.querySelectorAll(".book")

items.forEach(i=>i.classList.remove("center"))

const center=index+2

if(items[center]) items[center].classList.add("center")

}

function startAutoScroll(){

autoScroll=setInterval(()=>{

index++

updateCarousel()

},2500)

}

function enableDrag(){

let startX
let isDown=false

const carousel=document.querySelector(".carousel")

carousel.addEventListener("mousedown",e=>{

isDown=true
startX=e.pageX
clearInterval(autoScroll)

})

carousel.addEventListener("mouseup",()=>{

isDown=false
startAutoScroll()

})

carousel.addEventListener("mouseleave",()=>{

isDown=false
startAutoScroll()

})

carousel.addEventListener("mousemove",e=>{

if(!isDown) return

if(e.pageX-startX>50){

index--
updateCarousel()
startX=e.pageX

}

if(startX-e.pageX>50){

index++
updateCarousel()
startX=e.pageX

}

})

/* スマホスワイプ */

carousel.addEventListener("touchstart",e=>{

startX=e.touches[0].pageX
clearInterval(autoScroll)

})

carousel.addEventListener("touchend",e=>{

const endX=e.changedTouches[0].pageX

if(endX-startX>50){

index--
updateCarousel()

}

if(startX-endX>50){

index++
updateCarousel()

}

startAutoScroll()

})

}

window.addEventListener("resize",updateCarousel)

</script>

</body>
</html>
