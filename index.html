<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec"

let index=0
let books=[]
let originalLength=0

let startX=0
let isDragging=false

fetch(GAS_URL)
.then(res=>res.json())
.then(data=>{

originalLength=data.length

/* 無限用に3倍 */

books=[...data,...data,...data]

/* 中央から開始 */

index=originalLength

const track=document.getElementById("track")

books.forEach(book=>{

if(!book.cover) return

const div=document.createElement("div")
div.className="book"

div.innerHTML=`

<div class="book-inner">
<img src="${book.cover}">
</div>

<div class="book-title">${book.title}</div>
<a class="read-btn" href="${book.amazon}" target="_blank">読む</a>

`

div.addEventListener("click",e=>{

if(e.target.tagName==="A") return

div.classList.add("open")

setTimeout(()=>{
window.open(book.notion,"_blank")
},500)

})

track.appendChild(div)

})

updateCarousel()

/* 自動スライド */

setInterval(()=>{
index++
updateCarousel()
},2500)

/* スワイプ */

const carousel=document.querySelector(".carousel")

carousel.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
isDragging=true
})

carousel.addEventListener("touchmove",e=>{

if(!isDragging) return

const diff=e.touches[0].clientX-startX

if(diff>60){
index--
updateCarousel()
isDragging=false
}

if(diff<-60){
index++
updateCarousel()
isDragging=false
}

})

carousel.addEventListener("touchend",()=>{
isDragging=false
})

})

function updateCarousel(){

const track=document.getElementById("track")
const booksDOM=document.querySelectorAll(".book")

if(!booksDOM.length) return

const width=booksDOM[0].offsetWidth+40

/* 中央配置 */

track.style.transform=
`translateX(calc(50% - ${(index*width)+(width/2)}px))`

booksDOM.forEach(b=>b.classList.remove("center"))

if(booksDOM[index]){
booksDOM[index].classList.add("center")
}

/* 無限補正 */

if(index>=originalLength*2){
index=originalLength
}

if(index<originalLength){
index=originalLength*2-1
}

}

</script>
