<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bookshelf</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#fafafa;
padding:40px;
text-align:center;
}

h2{
margin-bottom:30px;
}

.carousel{
overflow:hidden;
width:100%;
}

.track{
display:flex;
gap:30px;
animation:scroll 40s linear infinite;
}

.carousel:hover .track{
animation-play-state:paused;
}

.book{
flex:0 0 auto;
transition:transform .4s;
}

.book img{
width:140px;
border-radius:8px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.book-title{
font-size:12px;
margin-top:8px;
width:140px;
}

.book.center{
transform:scale(1.3);
}

@keyframes scroll{
0%{
transform:translateX(0);
}
100%{
transform:translateX(-50%);
}
}

</style>

</head>

<body>

<h2>📚 心を動かした本</h2>

<div class="carousel">
<div class="track" id="track"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec";

fetch(API_URL)
.then(res=>res.json())
.then(books=>{

const track=document.getElementById("track")

const list=[...books,...books]

list.forEach(book=>{

const div=document.createElement("div")
div.className="book"

div.innerHTML=`
<a href="${book.notion}" target="_blank">
<img src="${book.cover}">
</a>
<div class="book-title">${book.title}</div>
`

track.appendChild(div)

})

highlightCenter()

})

function highlightCenter(){

const books=document.querySelectorAll(".book")

setInterval(()=>{

books.forEach(b=>b.classList.remove("center"))

const middle=Math.floor(Math.random()*books.length)

books[middle].classList.add("center")

},2000)

}

</script>

</body>
</html>
