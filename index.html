<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Book Shelf</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Noto Serif JP",serif;
background:linear-gradient(180deg,#f7f5f1,#ece7df);
text-align:center;
color:#333;
}

/* タイトル */

.title{
font-size:34px;
margin-top:60px;
margin-bottom:40px;
letter-spacing:2px;
}

/* カルーセル */

.carousel{
width:100%;
overflow:hidden;
position:relative;
}

.track{
display:flex;
gap:40px;
transition:transform .7s cubic-bezier(.4,0,.2,1);
align-items:flex-end;
}

/* 本 */

.book{
width:160px;
flex-shrink:0;
transition:transform .4s;
}

.book img{
width:160px;
height:240px;
object-fit:contain;
border-radius:10px;
background:white;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

/* 中央拡大 */

.book.center{
transform:scale(1.25);
}

/* タイトル */

.book-title{
margin-top:12px;
font-size:14px;
height:40px;
overflow:hidden;
line-height:1.4;
}

/* ボタン */

.read-btn{
display:inline-block;
margin-top:8px;
padding:6px 14px;
font-size:13px;
background:#333;
color:white;
border-radius:20px;
text-decoration:none;
transition:.3s;
}

.read-btn:hover{
background:#666;
}

/* レスポンシブ */

@media(max-width:900px){

.book{
width:130px;
}

.book img{
width:130px;
height:200px;
}

}

@media(max-width:600px){

.title{
font-size:24px;
}

.book{
width:110px;
}

.book img{
width:110px;
height:170px;
}

}

</style>
</head>

<body>

<div class="title">おすすめの本</div>

<div class="carousel">
<div class="track" id="track"></div>
</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw8q63nwevVB2noI6Fj_KNJhPvWjLNBKiJEW_IW_oi_8qEQ-a0iLQz11bAIpUy2u7TxVQ/exec"

let index=0
let books=[]

fetch(GAS_URL)
.then(res=>res.json())
.then(data=>{

/* ループ用に3倍 */

books=[...data,...data,...data]

const track=document.getElementById("track")

books.forEach(book=>{

/* 画像がない本はスキップ */

if(!book.cover) return

const div=document.createElement("div")
div.className="book"

div.innerHTML=`

<img src="${book.cover}">

<div class="book-title">
${book.title}
</div>

<a class="read-btn" href="${book.amazon}" target="_blank">
読む
</a>

`

track.appendChild(div)

})

updateCarousel()

setInterval(()=>{

index++
updateCarousel()

},2500)

})

function updateCarousel(){

const track=document.getElementById("track")
const first=document.querySelector(".book")

if(!first) return

const width=first.offsetWidth+40

track.style.transform=`translateX(${-index*width}px)`

document.querySelectorAll(".book").forEach(b=>b.classList.remove("center"))

const center=index+2
const books=document.querySelectorAll(".book")

if(books[center]) books[center].classList.add("center")

}

</script>

</body>
</html>
